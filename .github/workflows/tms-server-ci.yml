name: TMS Server CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'tms-server/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'tms-server/**'

# Global permissions for the entire workflow
permissions:
  contents: read
  checks: write
  pull-requests: write
  statuses: write
  actions: read
  security-events: write

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/tms-server

jobs:
  test:
    runs-on: ubuntu-latest
    
    # Add explicit permissions for better security and functionality
    permissions:
      contents: read
      checks: write
      pull-requests: write
      statuses: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'corretto'

    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Run tests with coverage
      run: |
        cd tms-server
        ./mvnw clean test -Dmaven.test.failure.ignore=true

    # Primary test reporting solution with proper error handling
    - name: Generate test report
      uses: dorny/test-reporter@v1
      if: success() || failure()
      with:
        name: Maven Tests
        path: tms-server/target/surefire-reports/*.xml
        reporter: java-junit
        fail-on-error: false
        fail-on-empty: false
        token: ${{ secrets.GITHUB_TOKEN }}

    # Fallback solution for forked repos or permission issues
    - name: Upload test results (fallback)
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          tms-server/target/surefire-reports/
          tms-server/target/site/jacoco/
        retention-days: 30

    # Enhanced test summary for PR comments
    - name: Test Summary
      uses: test-summary/action@v2
      if: always() && github.event_name == 'pull_request'
      with:
        paths: tms-server/target/surefire-reports/*.xml
        show: fail
        output: both

  build:
    needs: test
    runs-on: ubuntu-latest
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'corretto'

    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Build with Maven
      run: |
        cd tms-server
        ./mvnw clean package -DskipTests

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: ./tms-server
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max