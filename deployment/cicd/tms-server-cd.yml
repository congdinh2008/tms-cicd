name: TMS Server CD

on:
  workflow_run:
    workflows: ["TMS Server CI"]
    types:
      - completed
    branches: [main]

env:
  AWS_REGION: ap-southeast-1
  ECS_SERVICE: tms-server-service
  ECS_CLUSTER: tms-cluster
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/tms-server

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Deploy to EC2 via SSM
      run: |
        # Get the latest image tag
        IMAGE_TAG="main-$(echo ${{ github.sha }} | cut -c1-7)"
        
        # Create deployment script
        cat > deploy-script.sh << 'EOF'
        #!/bin/bash
        set -e
        
        # Stop existing container if running
        sudo docker stop tms-server || true
        sudo docker rm tms-server || true
        
        # Pull latest image
        sudo docker pull ${{ env.IMAGE_NAME }}:${IMAGE_TAG}
        
        # Run new container
        sudo docker run -d \
          --name tms-server \
          --restart unless-stopped \
          -p 8080:8080 \
          -e SPRING_PROFILES_ACTIVE=prod \
          ${{ env.IMAGE_NAME }}:${IMAGE_TAG}
        
        # Health check
        sleep 30
        curl -f http://localhost:8080/actuator/health || exit 1
        
        echo "Deployment successful!"
        EOF
        
        # Execute deployment script on EC2 instance
        aws ssm send-command \
          --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --parameters 'commands=["bash -s -- '"${IMAGE_TAG}"' < deploy-script.sh"]' \
          --comment "Deploy TMS Server ${IMAGE_TAG}"

    - name: Verify deployment
      run: |
        # Wait for deployment to complete
        sleep 60
        
        # Get instance public IP
        INSTANCE_IP=$(aws ec2 describe-instances \
          --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
          --query 'Reservations[0].Instances[0].PublicIpAddress' \
          --output text)
        
        # Health check
        curl -f http://${INSTANCE_IP}:8080/actuator/health
        
        echo "Health check passed for ${INSTANCE_IP}:8080"

    - name: Rollback on failure
      if: failure()
      run: |
        echo "Deployment failed, initiating rollback..."
        
        # Get previous successful image tag from ECR or implement your rollback strategy
        PREVIOUS_TAG="latest"
        
        cat > rollback-script.sh << 'EOF'
        #!/bin/bash
        
        # Stop failed container
        sudo docker stop tms-server || true
        sudo docker rm tms-server || true
        
        # Run previous version
        sudo docker run -d \
          --name tms-server \
          --restart unless-stopped \
          -p 8080:8080 \
          -e SPRING_PROFILES_ACTIVE=prod \
          ${{ env.IMAGE_NAME }}:${PREVIOUS_TAG}
        EOF
        
        aws ssm send-command \
          --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --parameters 'commands=["bash -s < rollback-script.sh"]' \
          --comment "Rollback TMS Server"

  notify:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Notify deployment status
      uses: 8398a7/action-slack@v3
      if: always()
      with:
        status: ${{ needs.deploy.result }}
        channel: '#deployments'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        fields: repo,message,commit,author,action,eventName,ref,workflow
